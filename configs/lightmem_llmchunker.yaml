dataset:
  name: locomo10
  path: /data/delta9043/datasets/locomo/locomo10.json

pipeline:
  pre_chunking:
    - type: NoFilter
    - type: NoCompressor
  chunker:
    type: PrecomputedChunker
    chunks_path: data/chunked_data/chunks_qwen32b.json

memory_backend:
  type: LightMemBackend
  base_url: http://localhost:8000/v1
  model: /data/delta9043/models/Qwen3-14B
  # native_chunking=false → NoOpSegmenter로 LightMem 청킹 무력화, 우리 LLM 청크 경계 사용
  native_chunking: false
  embedding_path: /data/delta9043/models/all-MiniLM-L6-v2
  embedding_dims: 384
  qdrant_path: ./qdrant_data/lightmem_llmchunker

evaluation:
  result_file: results/lightmem/llmchunker/result.json
