dataset:
  name: locomo10
  path: /data/delta9043/datasets/locomo/locomo10.json

pipeline:
  pre_chunking:
    - type: NoFilter
    - type: NoCompressor
  chunker:
    type: PrecomputedChunker
    chunks_path: data/chunked_data/chunks_qwen32b.json

memory_backend:
  type: SimpleMemBackend
  base_url: http://localhost:8000/v1
  model: /data/delta9043/models/Qwen3-14B
  db_path: ./lancedb_data/llmchunker
  clear_db_on_init: true

evaluation:
  result_file: results/simplemem/llmchunker/result.json
