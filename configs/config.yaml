dataset:
  name: locomo10
  path: /data/delta9043/datasets/locomo/locomo10.json
  sample_idx: 0  # 단일 샘플 전용. 전체 실행은 추후 별도 entrypoint로 분리

pipeline:
  pre_chunking:
    # 사용 가능한 Filter:
    #   - type: NoFilter
    #   - type: LLMFilter
    #       model_path: /data/delta9043/models/Qwen3-32B
    #       max_new_tokens: 512        # optional, default=512
    #       use_flash_attention: false  # optional, default=false
    # 사용 가능한 Compressor:
    #   - type: NoCompressor
    #   - type: LLMCompressor (미구현)
    - type: NoFilter
    - type: NoCompressor

  # 사용 가능한 Chunker:
  #   - type: NoChunker
  #   - type: FixedSizeChunker              (window, overlap)
  #   - type: AttentionSimilarityChunker    (llmlingua_model_path, embedder_model_path, ...)
  chunker:
    type: NoChunker

# 사용 가능한 Memory Backend:
#   - type: SimpleMemBackend
#       base_url: http://localhost:8000/v1
#       model: Qwen/Qwen3-14B
#       api_key: dummy            # optional, default=dummy
#       db_path: ./lancedb_data   # optional
#       table_name: null          # optional
#       clear_db_on_init: true    # optional, default=true
#
#   - type: AMemBackend
#       base_url: http://localhost:8000/v1
#       model: Qwen/Qwen3-14B
#       api_key: dummy            # optional, default=dummy
#       retrieve_k: 10            # optional, default=10
#       temperature_c5: 0.5       # optional, default=0.5
memory_backend:
  type: SimpleMemBackend
  base_url: http://localhost:8000/v1
  model: Qwen/Qwen3-14B
  clear_db_on_init: true