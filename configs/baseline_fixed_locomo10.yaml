# 파이프라인 설정
# pre_chunking: Filter와 Compressor를 순서대로 나열 (순서 변경 가능)
# chunker: 항상 마지막에 실행

dataset:
  name: locomo10
  path: /data/delta9043/datasets/locomo/locomo10.json
  sample_idx: 0                # 단일 샘플 인덱스 (정수). 전체 데이터셋 실행은 추후 별도 entrypoint로 분리

pipeline:
  pre_chunking:
    - type: NoFilter
    - type: NoCompressor
  chunker:
    type: FixedSizeChunker
    window: 5
    overlap: 0