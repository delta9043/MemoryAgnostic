dataset:
  name: locomo10
  path: /data/delta9043/datasets/locomo/locomo10.json
  sample_idx: 0

pipeline:
  pre_chunking:
    - type: NoFilter
    - type: NoCompressor
  chunker:
    type: FixedSizeChunker
    window: 5
    overlap: 0

memory_backend:
  type: SimpleMemBackend
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-8B"
  api_key: "EMPTY"
  db_path: "./lancedb_data"
  clear_db_on_init: true

evaluation:
  result_file: "results/baseline_fixed_locomo10.json"